<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quizabend – Lernübersicht</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:#0d1018; --card:#1a2030; --cardh:#1f2640; --surf:#141820;
  --acc:#f5c842; --red:#e05c3a; --teal:#4ec9b0; --pur:#b48ef5; --blue:#5ba4f5;
  --txt:#d8dce8; --mut:#6a7080;
  --bdr:rgba(255,255,255,0.07); --bdr2:rgba(255,255,255,0.13);
}
html { scroll-behavior: smooth; }
body { background:var(--bg); color:var(--txt); font-family:'DM Sans',sans-serif; min-height:100vh; }

/* ── HEADER ── */
header {
  background:linear-gradient(150deg,#161d2e 0%,#0d1018 70%);
  border-bottom:1px solid var(--bdr);
  padding:22px 24px 20px;
  position:relative; overflow:hidden;
  display:flex; align-items:center; justify-content:space-between; gap:20px;
}
header::after {
  content:'?'; position:absolute; right:-10px; top:-44px;
  font-size:280px; font-family:'Playfair Display',serif;
  color:rgba(245,200,66,.035); font-weight:900; pointer-events:none; line-height:1; z-index:0;
}
.header-title { position:relative; z-index:1; }
header h1 { font-family:'Playfair Display',serif; font-size:clamp(1.4rem,3.5vw,2.2rem); font-weight:900; color:#fff; line-height:1.15; }
header h1 em { color:var(--acc); font-style:normal; }
/* header search (desktop) */
.header-search { position:relative; z-index:1; flex-shrink:0; width:280px; }
.header-search svg {
  position:absolute; left:11px; top:50%; transform:translateY(-50%);
  width:15px; height:15px; stroke:var(--mut); fill:none;
  stroke-width:2; stroke-linecap:round; pointer-events:none;
}
#searchInput {
  width:100%; background:rgba(255,255,255,0.07);
  border:1.5px solid rgba(255,255,255,0.12); border-radius:100px;
  padding:9px 36px 9px 34px;
  font-family:'DM Sans',sans-serif; font-size:13px; color:var(--txt);
  outline:none; transition:border-color .15s, background .15s;
}
#searchInput::placeholder { color:var(--mut); }
#searchInput:focus { border-color:rgba(245,200,66,0.5); background:rgba(255,255,255,0.1); }
.search-clear {
  display:none; position:absolute; right:11px; top:50%; transform:translateY(-50%);
  background:none; border:none; cursor:pointer; color:var(--mut);
  font-size:18px; line-height:1; padding:0; transition:color .15s;
}
.search-clear:hover { color:var(--txt); }
.search-clear.vis { display:block; }
/* mobile nav search (identical sizing) */
.nav-search-wrap { position:relative; }
#searchInputMob {
  width:100%; background:rgba(255,255,255,0.07);
  border:1.5px solid rgba(255,255,255,0.12); border-radius:100px;
  padding:9px 36px 9px 34px;
  font-family:'DM Sans',sans-serif; font-size:13px; color:var(--txt);
  outline:none; transition:border-color .15s, background .15s;
}
#searchInputMob::placeholder { color:var(--mut); }
#searchInputMob:focus { border-color:rgba(245,200,66,0.5); background:rgba(255,255,255,0.1); }

/* ── NAV ── */
.nav-wrap {
  position:sticky; top:0; z-index:60;
  background:var(--surf); border-bottom:1px solid var(--bdr);
  padding:0 16px;
}
/* mobile: search row inside nav (hidden on desktop) */
.nav-search-row {
  display:none; padding:10px 0 0;
}
.nav-search-wrap { position:relative; }
.nav-search-wrap svg {
  position:absolute; left:11px; top:50%; transform:translateY(-50%);
  width:15px; height:15px; stroke:var(--mut); fill:none;
  stroke-width:2; stroke-linecap:round; pointer-events:none;
}
.result-count { font-size:11.5px; font-weight:600; color:var(--mut); white-space:nowrap; padding: 10px 0 0; }
.result-count span { color:var(--acc); }
.chip-row {
  display:flex; gap:7px; overflow-x:auto; scrollbar-width:none; align-items:center;
  padding:10px 0;
}
.chip-row::-webkit-scrollbar { display:none; }
.chip {
  flex-shrink:0;
  background:rgba(255,255,255,0.05); border:1.5px solid rgba(255,255,255,0.1);
  border-radius:100px; padding:7px 16px;
  font-family:'DM Sans',sans-serif; font-size:12.5px; font-weight:600;
  color:var(--mut); cursor:pointer; transition:all .15s; white-space:nowrap;
}
.chip:hover { color:var(--txt); border-color:rgba(255,255,255,0.22); }
.chip.on { background:var(--acc); border-color:var(--acc); color:#111; }
.card mark { background:rgba(245,200,66,0.3); color:inherit; border-radius:2px; padding:0 1px; }
.no-results { grid-column:1/-1; text-align:center; padding:48px 16px; color:var(--mut); }
.no-results strong { display:block; font-size:1.1rem; color:var(--txt); margin-bottom:6px; }

/* ── CONTENT ── */
.content { padding:24px 18px 64px; max-width:1040px; margin:0 auto; }

/* ── CARDS GRID ── */
.grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(290px,1fr)); gap:13px; }

.card {
  background:var(--card); border:1px solid var(--bdr); border-radius:12px;
  padding:18px 20px; transition:transform .15s,border-color .15s,background .15s;
}
.card:hover { transform:translateY(-2px); border-color:var(--bdr2); background:var(--cardh); }

/* card header row */
.card-head { display:flex; align-items:flex-start; justify-content:space-between; gap:8px; margin-bottom:10px; }
.card-head-left { display:flex; flex-direction:column; gap:6px; }

.badge-new { display:inline-block; background:var(--acc); color:#111; font-size:9px; font-weight:700; letter-spacing:0.5px; text-transform:uppercase; padding:2px 6px; border-radius:6px; width:fit-content; }
.tag { font-size:9px; font-weight:700; letter-spacing:1.5px; text-transform:uppercase; padding:3px 9px; border-radius:20px; display:inline-block; }
.tg{background:rgba(78,201,176,.14);color:var(--teal);}
.th{background:rgba(229,92,58,.14);color:var(--red);}
.ts{background:rgba(180,142,245,.14);color:var(--pur);}
.tc{background:rgba(245,200,66,.14);color:var(--acc);}
.tp{background:rgba(229,92,58,.11);color:#f07a60;}
.tb{background:rgba(91,164,245,.14);color:var(--blue);}
.tt{background:rgba(180,142,245,.11);color:#c9a8ff;}
.tf{background:rgba(78,201,176,.11);color:#6dd9c0;}
.tn{background:rgba(245,200,66,.18);color:#d4a830;}
.tw{background:rgba(255,255,255,.08);color:#aab0c0;}

.card h3 { font-size:13.5px; font-weight:600; color:#fff; margin-bottom:9px; line-height:1.3; }

/* bullet list */
.card ul { list-style:none; display:flex; flex-direction:column; gap:5px; }
.card ul li { font-size:12.5px; line-height:1.45; color:var(--txt); padding-left:14px; position:relative; }
.card ul li::before { content:'›'; position:absolute; left:0; color:var(--mut); font-weight:700; }
.card ul li strong { color:var(--acc); font-weight:600; }
.card ul li em { color:var(--mut); font-style:normal; font-size:11.5px; }

/* numbered list */
.card ol { list-style:decimal; padding-left:26px; display:flex; flex-direction:column; gap:4px; }
.card ol li { font-size:12px; line-height:1.45; color:var(--txt); padding-left:2px; }
.card ol li strong { color:var(--acc); font-weight:600; }
.card ol li em { color:var(--mut); font-style:normal; font-size:11px; }

/* ── Wahl bar chart ── */
.wahl-bars { display:flex; flex-direction:column; gap:7px; margin-top:4px; }
.wahl-row { display:flex; align-items:center; gap:8px; }
.wahl-label { font-size:11.5px; font-weight:600; color:var(--txt); width:44px; flex-shrink:0; }
.wahl-bar-bg { flex:1; background:rgba(255,255,255,.07); border-radius:4px; height:8px; overflow:hidden; }
.wahl-bar-fill { height:100%; border-radius:4px; transition:width .4s ease; }
.wahl-pct { font-size:11px; font-weight:700; color:var(--mut); width:38px; text-align:right; flex-shrink:0; }
.wahl-change { font-size:10px; font-weight:600; width:36px; text-align:right; flex-shrink:0; }
.wahl-change.up { color:#4ec9b0; }
.wahl-change.dn { color:var(--red); }

/* ── responsive ── */
@media(max-width:680px){
  header { padding:18px 16px 16px; flex-direction:column; align-items:flex-start; gap:12px; }
  .header-search { display:none; }       /* hide header search on mobile */
  .nav-search-row { display:block; }     /* show nav search on mobile */
  .content { padding:18px 12px 48px; }
  .grid { grid-template-columns:1fr; }
}
@media(min-width:681px){
  .nav-search-row { display:none; }      /* hide nav search on desktop */
}
</style>
</head>

<div class="content">

</div>

const CATS = [

// ══════════════════════════════════════════════════════
// RENDER
// ══════════════════════════════════════════════════════
let activeCat = 'all';

function buildChips() {
  const row = document.getElementById('chipRow');
  row.innerHTML = CATS.map(c =>
    '<button class="chip'+(c.id===activeCat?' on':'')+'" data-id="'+c.id+'">'+c.label+'</button>'
  ).join('');
  row.querySelectorAll('.chip').forEach(btn =>
    btn.addEventListener('click', function(){
      activeCat = this.dataset.id;
      buildChips();
      renderGrid();
      window.scrollTo({top:0,behavior:'smooth'});
    })
  );
}

function buildWahlCard(c) {
  const maxPct = 32;
  let html = '<div class="card"><div class="card-head"><div class="card-head-left">';
  html += '<span class="tag '+c.tc+'">'+c.tag+'</span>';
  if(c.hot) html += '<span class="badge-new">Aktuell</span>';
  html += '</div></div><h3>'+c.title+'</h3>';
  html += '<div class="wahl-bars">';
  c.wahlData.forEach(w => {
    const diff = (w.pct - w.prev).toFixed(1);
    const diffStr = diff > 0 ? '+'+diff+' %' : diff+' %';
    const diffCls = diff > 0 ? 'up' : 'dn';
    const width = Math.round(w.pct / maxPct * 100);
    html += '<div class="wahl-row">';
    html += '<div class="wahl-label">'+w.label+'</div>';
    html += '<div class="wahl-bar-bg"><div class="wahl-bar-fill" style="width:'+width+'%;background:'+w.color+'"></div></div>';
    html += '<div class="wahl-pct">'+w.pct+' %</div>';
    html += '<div class="wahl-change '+diffCls+'">'+diffStr+'</div>';
    html += '</div>';
  });
  html += '</div>';
  html += '<p style="font-size:11px;color:var(--mut);margin-top:10px">Landesergebnis Hessen · endgültiges Ergebnis</p>';
  html += '</div>';
  return html;
}

function buildCard(c) {
  if(c.wahlData) return buildWahlCard(c);

  let html = '<div class="card"><div class="card-head"><div class="card-head-left">';
  html += '<span class="tag '+c.tc+'">'+c.tag+'</span>';
  if(c.hot) html += '<span class="badge-new">Aktuell</span>';
  html += '</div></div>';
  html += '<h3>'+c.title+'</h3>';

  const listTag = c.ol ? 'ol' : 'ul';
  const items = c.items || [];
  html += '<'+listTag+'>' + items.map(i => '<li>'+i+'</li>').join('') + '</'+listTag+'>';

  html += '</div>';
  return html;
}

function renderGrid() {
  const visible = activeCat === 'all' ? CARDS : CARDS.filter(c => c.cat === activeCat);
  document.getElementById('grid').innerHTML = visible.map(c => buildCard(c)).join('');
}

// ── SEARCH ──
let searchQuery = '';

const searchInput    = document.getElementById('searchInput');
const searchClear    = document.getElementById('searchClear');
const searchInputMob = document.getElementById('searchInputMob');
const searchClearMob = document.getElementById('searchClearMob');
const resultCount    = document.getElementById('resultCount');

function onSearch(val, clearBtn, otherInput) {
  searchQuery = val.trim().toLowerCase();
  clearBtn.classList.toggle('vis', searchQuery.length > 0);
  if(otherInput) otherInput.value = val;
  if(searchQuery) { activeCat = 'all'; buildChips(); }
  renderGrid();
}

searchInput.addEventListener('input', function() {
  onSearch(this.value, searchClear, searchInputMob);
});
searchInputMob.addEventListener('input', function() {
  onSearch(this.value, searchClearMob, searchInput);
});

function clearSearch(mainInput, mobInput, clearBtn, clearBtnMob) {
  mainInput.value = ''; mobInput.value = '';
  searchQuery = '';
  clearBtn.classList.remove('vis');
  clearBtnMob.classList.remove('vis');
  resultCount.innerHTML = '';
  renderGrid();
  mainInput.focus();
}
searchClear.addEventListener('click', () => clearSearch(searchInput, searchInputMob, searchClear, searchClearMob));
searchClearMob.addEventListener('click', () => clearSearch(searchInput, searchInputMob, searchClear, searchClearMob));

// highlight matched text in HTML
function highlight(html, query) {
  if(!query) return html;
  const safe = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  return html.replace(new RegExp('(' + safe + ')', 'gi'), '<mark>$1</mark>');
}

// check if a card matches the query
function cardMatches(c, q) {
  if(!q) return true;
  const haystack = (c.title + ' ' + c.tag + ' ' + (c.items||[]).join(' ')).toLowerCase();
  return haystack.includes(q);
}

// ── UPDATED RENDER ──
function renderGrid() {
  let pool = activeCat === 'all' ? CARDS : CARDS.filter(c => c.cat === activeCat);
  if(searchQuery) pool = pool.filter(c => cardMatches(c, searchQuery));

  // Update count
  if(searchQuery || activeCat !== 'all') {
    resultCount.innerHTML = '<span>' + pool.length + '</span> Karten';
  } else {
    resultCount.innerHTML = '';
  }

  if(pool.length === 0) {
    document.getElementById('grid').innerHTML =
      '<div class="no-results"><strong>Keine Treffer</strong>Versuch ein anderes Stichwort</div>';
    return;
  }

  document.getElementById('grid').innerHTML = pool.map(c => {
    let html = buildCard(c);
    if(searchQuery) html = highlight(html, searchQuery);
    return html;
  }).join('');
}

// ── INIT ──
buildChips();
renderGrid();
