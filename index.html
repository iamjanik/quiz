<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:#0d1018; --surf:#141820; --card:#1a2030; --cardh:#1f2640;
  --acc:#f5c842; --red:#e05c3a; --teal:#4ec9b0; --pur:#b48ef5; --blue:#5ba4f5;
  --txt:#d8dce8; --mut:#6a7080;
  --bdr:rgba(255,255,255,0.07); --bdr2:rgba(255,255,255,0.13);
  --nav-w:200px;
}
html { scroll-behavior: smooth; }
body { background:var(--bg); color:var(--txt); font-family:'DM Sans',sans-serif; min-height:100vh; }

/* HEADER */
header {
  background:linear-gradient(150deg,#161d2e 0%,#0d1018 70%);
  border-bottom:1px solid var(--bdr);
  padding:36px 28px 24px; position:relative; overflow:hidden;
}
header::after {
  content:'?'; position:absolute; right:-10px; top:-44px;
  font-size:280px; font-family:'Playfair Display',serif;
  color:rgba(245,200,66,.035); font-weight:900; pointer-events:none; line-height:1;
}
.eyebrow { font-size:10px; font-weight:700; letter-spacing:2.5px; text-transform:uppercase; color:var(--acc); margin-bottom:10px; }
header h1 { font-family:'Playfair Display',serif; font-size:clamp(1.8rem,4.5vw,2.8rem); font-weight:900; color:#fff; line-height:1.1; position:relative; z-index:1; }
header h1 em { color:var(--acc); font-style:normal; }

/* LAYOUT */
.shell { display:flex; min-height:calc(100vh - 115px); }

/* SIDEBAR */
.sidebar {
  width:var(--nav-w); flex-shrink:0;
  background:var(--surf); border-right:1px solid var(--bdr);
  padding:12px 0 40px;
  position:sticky; top:0; height:calc(100vh - 115px);
  overflow-y:auto; scrollbar-width:none;
}
.sidebar::-webkit-scrollbar { display:none; }
.nav-btn {
  display:block; width:100%;
  background:none; border:none; border-left:3px solid transparent;
  text-align:left; padding:10px 18px 10px 15px; cursor:pointer;
  font-family:'DM Sans',sans-serif; font-size:13.5px; font-weight:500;
  color:var(--mut); transition:color .15s,background .15s,border-color .15s;
}
.nav-btn:hover { color:var(--txt); background:rgba(255,255,255,.03); }
.nav-btn.on { color:#fff; font-weight:600; border-left-color:var(--acc); background:rgba(245,200,66,.07); }

/* MOBILE TOP BAR */
.mob-bar {
  display:none; position:sticky; top:0; z-index:60;
  background:var(--surf); border-bottom:1px solid var(--bdr);
  overflow-x:auto; scrollbar-width:none; padding:0 8px;
  white-space:nowrap;
}
.mob-bar::-webkit-scrollbar { display:none; }
.mob-btn {
  display:inline-block; background:none; border:none;
  border-bottom:2px solid transparent; margin-bottom:-1px;
  font-family:'DM Sans',sans-serif; font-size:13px; font-weight:600;
  color:var(--mut); padding:12px 14px; cursor:pointer;
  transition:color .15s,border-color .15s;
}
.mob-btn:hover { color:var(--txt); }
.mob-btn.on { color:var(--acc); border-bottom-color:var(--acc); }

/* CONTENT */
.content { flex:1; min-width:0; padding:28px 24px 60px; }
.view { display:none; }
.view.on { display:block; animation:up .2s ease; }
@keyframes up { from{opacity:0;transform:translateY(5px)} to{opacity:1;transform:translateY(0)} }

/* CARDS */
.grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:13px; }
.card {
  background:var(--card); border:1px solid var(--bdr); border-radius:10px;
  padding:18px 20px; transition:transform .15s,border-color .15s,background .15s;
}
.card:hover { transform:translateY(-2px); border-color:var(--bdr2); background:var(--cardh); }
.card.hot { border-color:rgba(245,200,66,.26); background:rgba(245,200,66,.03); }
.card.hot:hover { border-color:rgba(245,200,66,.42); }

.badge { display:inline-block; background:var(--acc); color:#111; font-size:9px; font-weight:700; letter-spacing:1px; text-transform:uppercase; padding:2px 7px; border-radius:10px; margin-left:7px; vertical-align:middle; }
.tag { font-size:9px; font-weight:700; letter-spacing:1.5px; text-transform:uppercase; padding:3px 9px; border-radius:20px; display:inline-block; margin-bottom:10px; }
.tg{background:rgba(78,201,176,.14);color:var(--teal);}
.th{background:rgba(229,92,58,.14);color:var(--red);}
.ts{background:rgba(180,142,245,.14);color:var(--pur);}
.tc{background:rgba(245,200,66,.14);color:var(--acc);}
.tp{background:rgba(229,92,58,.11);color:#f07a60;}
.tb{background:rgba(91,164,245,.14);color:var(--blue);}
.tt{background:rgba(180,142,245,.11);color:#c9a8ff;}
.tf{background:rgba(78,201,176,.11);color:#6dd9c0;}
.tn{background:rgba(245,200,66,.18);color:#d4a830;}

.card h3 { font-size:13.5px; font-weight:600; color:#fff; margin-bottom:9px; line-height:1.3; }
.card ul { list-style:none; display:flex; flex-direction:column; gap:5px; }
.card ul li { font-size:12.5px; line-height:1.45; color:var(--txt); padding-left:14px; position:relative; }
.card ul li::before { content:'›'; position:absolute; left:0; color:var(--mut); font-weight:700; }
.card ul li strong { color:var(--acc); font-weight:600; }
.card ul li em { color:var(--mut); font-style:normal; font-size:11.5px; }
.card ol { list-style:decimal; padding-left:18px; display:flex; flex-direction:column; gap:4px; }
.card ol li { font-size:12px; line-height:1.45; color:var(--txt); padding-left:3px; }
.card ol li strong { color:var(--acc); font-weight:600; }
.card ol li em { color:var(--mut); font-style:normal; font-size:11px; }

@media (max-width:680px) {
  header { padding:22px 16px 18px; }
  .sidebar { display:none; }
  .mob-bar { display:block; }
  .shell { flex-direction:column; }
  .content { padding:18px 14px 48px; }
  .grid { grid-template-columns:1fr; }
}
</style>
</head>

    '<strong>Mainz</strong>: Landeshauptstadt RLP; Gutenberg-Museum',
    '<strong>Darmstadt</strong>: „Wissenschaftsstadt", TU Darmstadt',
    '<strong>Limburg</strong>: bekannter Dom, an der Lahn',
    '<strong>Loreley</strong>: Felsen im Rhein bei St. Goarshausen',
    'Oberes Mittelrheintal: <strong>UNESCO</strong>-Welterbe',
  ]},
]},

]; // end CATS

// ─── STATE & RENDER ──────────────────────────────────────
let active = 'news';

function renderNav() {
  // sidebar
  const sb = document.getElementById('sidebar');
  sb.innerHTML = CATS.map(c =>
    '<button class="nav-btn' + (c.id === active ? ' on' : '') +
    '" data-id="' + c.id + '">' + c.label + '</button>'
  ).join('');

  // mobile bar
  const mb = document.getElementById('mobBar');
  mb.innerHTML = CATS.map(c =>
    '<button class="mob-btn' + (c.id === active ? ' on' : '') +
    '" data-id="' + c.id + '">' + c.label + '</button>'
  ).join('');

  // attach events
  document.querySelectorAll('.nav-btn, .mob-btn').forEach(btn => {
    btn.addEventListener('click', function() {
      active = this.dataset.id;
      renderNav();
      renderCards();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });
  });
}

function renderCards() {
  const box = document.getElementById('content');
  const cat = CATS.find(c => c.id === active);
  if (!cat) { box.innerHTML = ''; return; }

  let html = '<div class="grid">';
  cat.cards.forEach(c => {
    html += '<div class="card' + (c.hot ? ' hot' : '') + '">';
    html += '<span class="tag ' + c.tc + '">' + c.tag + '</span>';
    if (c.hot) html += '<span class="badge">Aktuell</span>';
    html += '<h3>' + c.title + '</h3>';
    if (c.ol) {
      html += '<ol>' + c.items.map(i => '<li>' + i + '</li>').join('') + '</ol>';
    } else {
      html += '<ul>' + c.items.map(i => '<li>' + i + '</li>').join('') + '</ul>';
    }
    html += '</div>';
  });
  html += '</div>';
  box.innerHTML = html;
}

// init
renderNav();
renderCards();
</script>
</body>
</html>
